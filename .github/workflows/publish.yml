name: 📦 Publish to PyPI & Update Homebrew

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & Publish to PyPI
  # ──────────────────────────────────────────────
  publish-pypi:
    name: 📦 Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/terminal-games/
    permissions:
      id-token: write  # Trusted publishing (no API token needed)

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: 🔨 Build package
        run: uv build

      - name: 📤 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ──────────────────────────────────────────────
  # Job 2: Update Homebrew Tap
  # ──────────────────────────────────────────────
  update-homebrew:
    name: 🍺 Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⏳ Wait for PyPI to index the new version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Waiting for terminal-games==${VERSION} on PyPI..."
          for i in $(seq 1 30); do
            if pip index versions terminal-games 2>/dev/null | grep -q "${VERSION}"; then
              echo "✅ Version ${VERSION} found on PyPI!"
              break
            fi
            echo "Attempt ${i}/30 — not yet available, waiting 10s..."
            sleep 10
          done

      - name: 🔢 Get version & SHA256
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Download the sdist from PyPI and compute SHA256
          URL="https://files.pythonhosted.org/packages/source/t/terminal-games/terminal_games-${VERSION}.tar.gz"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

          curl -sSL -o terminal_games.tar.gz "${URL}"
          SHA256=$(sha256sum terminal_games.tar.gz | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

          echo "📦 Version: ${VERSION}"
          echo "🔗 URL: ${URL}"
          echo "🔒 SHA256: ${SHA256}"

      - name: 🍺 Update Homebrew formula in tap repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: ayu5h-raj/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "formula": "terminal-games",
              "version": "${{ steps.meta.outputs.version }}",
              "url": "${{ steps.meta.outputs.url }}",
              "sha256": "${{ steps.meta.outputs.sha256 }}"
            }
