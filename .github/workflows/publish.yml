name: 📦 Publish to PyPI & Update Homebrew

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & Publish to PyPI
  # ──────────────────────────────────────────────
  publish-pypi:
    name: 📦 Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/terminal-games/
    permissions:
      id-token: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: 🔨 Build package
        run: uv build

      - name: 📤 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ──────────────────────────────────────────────
  # Job 2: Update Homebrew Tap
  # ──────────────────────────────────────────────
  update-homebrew:
    name: 🍺 Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: publish-pypi

    steps:
      - name: ⏳ Wait for PyPI to index the new version
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          PYPI_VERSION="${VERSION#v}"
          echo "Waiting for terminal-games==${PYPI_VERSION} on PyPI..."
          MAX_RETRIES=30
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -sSf "https://pypi.org/pypi/terminal-games/${PYPI_VERSION}/json" > /dev/null 2>&1; then
              echo "✅ Version ${PYPI_VERSION} found on PyPI!"
              break
            fi
            if [ $i -eq $MAX_RETRIES ]; then
              echo "❌ Version ${PYPI_VERSION} not found after ${MAX_RETRIES} attempts"
              exit 1
            fi
            echo "Attempt ${i}/${MAX_RETRIES} — not yet available, waiting ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

      - name: 🍺 Update Homebrew Tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          PYPI_VERSION="${VERSION#v}"

          # Fetch package metadata from PyPI
          PYPI_JSON=$(curl -sSL "https://pypi.org/pypi/terminal-games/${PYPI_VERSION}/json")
          SDIST_URL=$(echo "$PYPI_JSON" | python3 -c "import json,sys; data=json.load(sys.stdin); print([u for u in data['urls'] if u['filename'].endswith('.tar.gz')][0]['url'])")
          SDIST_SHA256=$(echo "$PYPI_JSON" | python3 -c "import json,sys; data=json.load(sys.stdin); print([u for u in data['urls'] if u['filename'].endswith('.tar.gz')][0]['digests']['sha256'])")

          # Fetch blessed dependency metadata
          BLESSED_JSON=$(curl -sSL "https://pypi.org/pypi/blessed/json")
          BLESSED_URL=$(echo "$BLESSED_JSON" | python3 -c "import json,sys; data=json.load(sys.stdin); print([u for u in data['urls'] if u['filename'].endswith('.tar.gz')][0]['url'])")
          BLESSED_SHA256=$(echo "$BLESSED_JSON" | python3 -c "import json,sys; data=json.load(sys.stdin); print([u for u in data['urls'] if u['filename'].endswith('.tar.gz')][0]['digests']['sha256'])")

          # Fetch wcwidth dependency metadata
          WCWIDTH_JSON=$(curl -sSL "https://pypi.org/pypi/wcwidth/json")
          WCWIDTH_URL=$(echo "$WCWIDTH_JSON" | python3 -c "import json,sys; data=json.load(sys.stdin); print([u for u in data['urls'] if u['filename'].endswith('.tar.gz')][0]['url'])")
          WCWIDTH_SHA256=$(echo "$WCWIDTH_JSON" | python3 -c "import json,sys; data=json.load(sys.stdin); print([u for u in data['urls'] if u['filename'].endswith('.tar.gz')][0]['digests']['sha256'])")

          echo "📦 Version: ${PYPI_VERSION}"
          echo "🔗 URL: ${SDIST_URL}"
          echo "🔒 SHA256: ${SDIST_SHA256}"

          # Clone homebrew-tap repo
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ayu5h-raj/homebrew-tap.git
          cd homebrew-tap

          # Write the updated formula
          cat > Formula/terminal-games.rb << EOF
          class TerminalGames < Formula
            include Language::Python::Virtualenv

            desc "A collection of classic mini games you can play right in your terminal"
            homepage "https://github.com/ayu5h-raj/terminal-games"
            url "${SDIST_URL}"
            sha256 "${SDIST_SHA256}"
            license "MIT"

            depends_on "python@3.13"

            resource "blessed" do
              url "${BLESSED_URL}"
              sha256 "${BLESSED_SHA256}"
            end

            resource "wcwidth" do
              url "${WCWIDTH_URL}"
              sha256 "${WCWIDTH_SHA256}"
            end

            def install
              virtualenv_install_with_resources
            end

            test do
              assert_match "terminal_games", shell_output("#{bin}/terminal-games --help 2>&1", 2)
            end
          end
          EOF

          # Fix indentation (remove leading spaces from heredoc)
          sed -i 's/^          //' Formula/terminal-games.rb

          echo "✅ Formula updated:"
          cat Formula/terminal-games.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/terminal-games.rb
          git commit -m "🍺 Update terminal-games to ${VERSION}"
          git push

  # ──────────────────────────────────────────────
  # Job 3: Create a GitHub Release for the tag
  # ──────────────────────────────────────────────
  create-release:
    name: 📝 Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists — skipping."
            exit 0
          fi
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --latest
